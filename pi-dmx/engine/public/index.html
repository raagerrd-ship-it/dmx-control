<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>DMX Control</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <style>
    :root { --bg:#0a0a0f; --card:#15151f; --line:#252535; --fg:#e8e8f0; --dim:#7a7a90; --hot:#ff3a6b; --ok:#40e0a0; --warn:#ffb020; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin:0; padding:0; background:var(--bg); color:var(--fg); font: 15px -apple-system, system-ui, sans-serif; overscroll-behavior: none; }
    body { padding: env(safe-area-inset-top) 16px calc(env(safe-area-inset-bottom) + 24px); }
    h1 { font-size: 13px; letter-spacing: .12em; text-transform: uppercase; color: var(--dim); margin: 20px 0 10px; font-weight: 600; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 14px; margin-bottom: 12px; }
    .modes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .mode-btn { padding: 14px 8px; background: var(--card); border: 1px solid var(--line); border-radius: 10px; color: var(--fg); font-size: 14px; font-weight: 500; cursor: pointer; text-transform: capitalize; }
    .mode-btn.active { background: var(--hot); border-color: var(--hot); color: white; }
    .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .row label { color: var(--dim); font-size: 13px; }
    .row .val { font-variant-numeric: tabular-nums; color: var(--fg); font-size: 13px; }
    input[type=range] { width: 100%; accent-color: var(--hot); }
    .meter { height: 6px; background: var(--line); border-radius: 3px; overflow: hidden; margin-top: 8px; }
    .meter > div { height: 100%; background: linear-gradient(90deg, var(--ok), var(--hot)); transition: width 60ms linear; }
    .kick-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background: var(--line); margin-left: 6px; vertical-align: middle; transition: background 40ms; }
    .kick-dot.on { background: var(--hot); box-shadow: 0 0 12px var(--hot); }
    .status { font-size: 12px; color: var(--dim); margin-top: 8px; }

    /* Fixture editor */
    .fx { border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; }
    .fx.dirty { border-color: var(--warn); }
    .fx.err   { border-color: var(--hot); }
    .fx-head { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    .fx-head input.name { flex: 1; background: transparent; border: 0; color: var(--fg); font-size: 15px; font-weight: 500; padding: 6px 0; }
    .fx-head button.del { background: transparent; border: 0; color: var(--dim); font-size: 18px; cursor: pointer; padding: 4px 8px; }
    .fx-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .fx-field label { display: block; font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 3px; }
    .fx-field input, .fx-field select { width: 100%; padding: 8px 10px; background: var(--bg); border: 1px solid var(--line); border-radius: 8px; color: var(--fg); font-size: 15px; font-variant-numeric: tabular-nums; }
    .fx-roles { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .fx-role { background: var(--bg); border: 1px solid var(--line); border-radius: 6px; padding: 4px 8px; font-size: 12px; }
    .fx-role select { background: transparent; border: 0; color: var(--fg); font-size: 12px; }
    .fx-role .rm { color: var(--dim); margin-left: 4px; cursor: pointer; }
    .fx-meta { font-size: 11px; color: var(--dim); margin-top: 6px; }
    .fx-err  { font-size: 11px; color: var(--hot); margin-top: 6px; }
    .fx.identifying { border-color: var(--ok); box-shadow: 0 0 0 2px rgba(64,224,160,.25); }
    .fx-head button.id { background: transparent; border: 1px solid var(--line); border-radius: 6px; color: var(--dim); font-size: 11px; padding: 4px 8px; cursor: pointer; margin-right: 4px; text-transform: uppercase; letter-spacing: .06em; }
    .fx-head button.id:hover { color: var(--ok); border-color: var(--ok); }
    .fx-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .fx-pack { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
    .fx-pack select { flex: 1; padding: 8px 10px; background: var(--bg); border: 1px solid var(--line); border-radius: 8px; color: var(--fg); font-size: 13px; }
    .btn { flex: 1; padding: 12px; background: var(--card); border: 1px solid var(--line); border-radius: 10px; color: var(--fg); font-size: 14px; font-weight: 500; cursor: pointer; }
    .btn.primary { background: var(--hot); border-color: var(--hot); color: white; }
    .btn.ok { background: transparent; border-color: var(--ok); color: var(--ok); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
  </style>
</head>
<body>
  <h1>Mode</h1>
  <div class="card">
    <div class="modes" id="modes"></div>
  </div>

  <h1>Level <span class="kick-dot" id="kickDot"></span></h1>
  <div class="card">
    <div class="row"><label>Input</label><span class="val" id="levelVal">–</span></div>
    <div class="meter"><div id="levelBar" style="width:0%"></div></div>
    <div class="status">Auto-gain: <span id="gainVal">–</span>×</div>
  </div>

  <h1>Sensitivity</h1>
  <div class="card">
    <div class="row"><label>How reactive</label><span class="val" id="sensVal">–</span></div>
    <input type="range" id="sens" min="0" max="100" value="60" />
  </div>

  <h1>Master brightness</h1>
  <div class="card">
    <div class="row"><label>Overall level</label><span class="val" id="masterVal">–</span></div>
    <input type="range" id="master" min="0" max="100" value="100" />
  </div>

  <div id="monoCard" style="display:none">
    <h1>Mono color</h1>
    <div class="card">
      <div class="row">
        <label>Hue</label>
        <span class="val"><span id="monoSwatch" style="display:inline-block;width:18px;height:18px;border-radius:4px;vertical-align:middle;border:1px solid var(--line);margin-right:6px"></span><span id="monoVal">–</span>°</span>
      </div>
      <input type="range" id="monoHue" min="0" max="359" value="15" style="background:linear-gradient(90deg,#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00);height:10px;border-radius:5px;-webkit-appearance:none;appearance:none" />
      <div class="fx-actions" style="margin-top:10px">
        <button class="btn" data-preset-hue="0">Red</button>
        <button class="btn" data-preset-hue="15">Fire</button>
        <button class="btn" data-preset-hue="60">Yellow</button>
        <button class="btn" data-preset-hue="120">Green</button>
        <button class="btn" data-preset-hue="200">Cyan</button>
        <button class="btn" data-preset-hue="240">Blue</button>
        <button class="btn" data-preset-hue="290">Purple</button>
        <button class="btn" data-preset-hue="330">Pink</button>
      </div>
    </div>
  </div>


  <h1>Fixtures</h1>
  <div class="card">
    <div id="fixtures"></div>
    <div class="fx-pack">
      <select id="fxSort" title="How Auto-address orders fixtures">
        <option value="list">Sort: list order</option>
        <option value="name">Sort: by name (A→Z)</option>
        <option value="widest">Sort: widest first</option>
        <option value="narrowest">Sort: narrowest first</option>
      </select>
      <button class="btn" id="fxAutoPack" style="flex:0 0 auto">Auto-address</button>
    </div>
    <div class="fx-actions">
      <button class="btn" id="fxAdd">+ Add fixture</button>
      <button class="btn ok" id="fxIdentifyAll" title="Blink each fixture in order">Identify all</button>
      <button class="btn primary" id="fxSave" disabled>Save changes</button>
    </div>
    <div class="status" id="fxHint">Tap a fixture to edit. Use Identify to locate lamps in the room.</div>
  </div>

  <div class="status" id="conn">Connecting…</div>


<script>
const MODES = ["auto","chill","party","chase","mono","strobe","blackout"];
const modesEl = document.getElementById("modes");
const kickDot = document.getElementById("kickDot");
const levelBar = document.getElementById("levelBar");
const levelVal = document.getElementById("levelVal");
const gainVal = document.getElementById("gainVal");
const sensEl = document.getElementById("sens");
const sensVal = document.getElementById("sensVal");
const masterEl = document.getElementById("master");
const masterVal = document.getElementById("masterVal");
const monoCard = document.getElementById("monoCard");
const monoHueEl = document.getElementById("monoHue");
const monoValEl = document.getElementById("monoVal");
const monoSwatch = document.getElementById("monoSwatch");
const connEl = document.getElementById("conn");

let ws;
function connect() {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onopen  = () => connEl.textContent = "Connected";
  ws.onclose = () => { connEl.textContent = "Disconnected — retrying…"; setTimeout(connect, 1500); };
  ws.onmessage = (ev) => {
    const m = JSON.parse(ev.data);
    if (m.type === "config") applyConfig(m.config);
    else if (m.type === "frame") applyFrame(m);
  };
}
function send(obj) { if (ws?.readyState === 1) ws.send(JSON.stringify(obj)); }

function renderModes(current) {
  modesEl.innerHTML = "";
  for (const m of MODES) {
    const b = document.createElement("button");
    b.className = "mode-btn" + (m === current ? " active" : "");
    b.textContent = m;
    b.onclick = () => send({ type: "setMode", mode: m });
    modesEl.appendChild(b);
  }
}
function applyConfig(cfg) {
  renderModes(cfg.mode);
  sensEl.value = Math.round(cfg.sensitivity * 100);
  sensVal.textContent = sensEl.value + "%";
  masterEl.value = Math.round(cfg.master * 100);
  masterVal.textContent = masterEl.value + "%";
  // Mono color card: only meaningful when mode === "mono", but we keep the
  // slider synced regardless so switching to mono lands on the right color.
  const hue = Math.round(cfg.monoHue ?? 15);
  monoHueEl.value = hue;
  monoValEl.textContent = hue;
  monoSwatch.style.background = `hsl(${hue} 100% 50%)`;
  monoCard.style.display = cfg.mode === "mono" ? "" : "none";
  identifyingIndex = cfg.identify?.index ?? -1;
  if (!fxDirty) { fxDraft = deepClone(cfg.fixtures); renderFixtures(); }
  else renderFixtures();
}
let kickTimer;
function applyFrame(f) {
  const pct = Math.round(f.level * 100);
  levelBar.style.width = pct + "%";
  levelVal.textContent = pct + "%";
  gainVal.textContent = f.gain.toFixed(1);
  if (f.kick) {
    kickDot.classList.add("on");
    clearTimeout(kickTimer);
    kickTimer = setTimeout(() => kickDot.classList.remove("on"), 120);
  }
}
sensEl.oninput = () => { sensVal.textContent = sensEl.value + "%"; send({ type: "setSensitivity", value: sensEl.value / 100 }); };
masterEl.oninput = () => { masterVal.textContent = masterEl.value + "%"; send({ type: "setMaster", value: masterEl.value / 100 }); };

/* ── Fixture editor ─────────────────────────────────────────────────── */
const PRESETS = ["rgb", "rgbw", "dimmer", "custom"];
const PRESET_ROLES = {
  rgb:    ["r","g","b"],
  rgbw:   ["r","g","b","w"],
  dimmer: ["dim"],
};
const ROLE_OPTIONS = ["r","g","b","w","dim","strobe","unused"];
const fxEl = document.getElementById("fixtures");
const fxSaveBtn = document.getElementById("fxSave");
const fxHint = document.getElementById("fxHint");
let fxDraft = [];
let fxDirty = false;
let identifyingIndex = -1;    // -1 = no identify in progress
const deepClone = (x) => JSON.parse(JSON.stringify(x));
const rolesOf = (fx) => fx.preset === "custom" ? (fx.roles ?? []) : PRESET_ROLES[fx.preset];

function markDirty() {
  fxDirty = true;
  fxSaveBtn.disabled = validateAll().length > 0;
  renderFixtures();
}

function validateAll() {
  const errs = [];
  const used = new Map(); // channel → fixture index
  fxDraft.forEach((fx, i) => {
    const width = rolesOf(fx).length;
    if (!fx.name || fx.name.trim() === "") errs.push({ i, msg: "Name required" });
    if (!Number.isInteger(fx.address) || fx.address < 1 || fx.address > 512)
      errs.push({ i, msg: "Address 1–512" });
    else if (fx.address + width - 1 > 512)
      errs.push({ i, msg: `Overflows universe (needs ${width} ch)` });
    else {
      for (let c = fx.address; c < fx.address + width; c++) {
        if (used.has(c)) errs.push({ i, msg: `Ch ${c} overlaps "${fxDraft[used.get(c)].name}"` });
        else used.set(c, i);
      }
    }
    if (fx.preset === "custom" && (!fx.roles || fx.roles.length === 0))
      errs.push({ i, msg: "Add at least one channel" });
  });
  return errs;
}

function renderFixtures() {
  const errs = validateAll();
  const errByIdx = new Map();
  errs.forEach((e) => {
    if (!errByIdx.has(e.i)) errByIdx.set(e.i, []);
    errByIdx.get(e.i).push(e.msg);
  });

  fxEl.innerHTML = "";
  fxDraft.forEach((fx, i) => {
    const width = rolesOf(fx).length;
    const div = document.createElement("div");
    div.className = "fx" + (fxDirty ? " dirty" : "")
                  + (errByIdx.has(i) ? " err" : "")
                  + (i === identifyingIndex ? " identifying" : "");
    div.innerHTML = `
      <div class="fx-head">
        <input class="name" type="text" value="${escapeHtml(fx.name)}" data-i="${i}" data-k="name" />
        <button class="id" data-id="${i}" title="Blink this fixture">Identify</button>
        <button class="del" data-del="${i}" aria-label="Remove">×</button>
      </div>
      <div class="fx-grid">
        <div class="fx-field">
          <label>DMX address</label>
          <input type="number" min="1" max="512" value="${fx.address}" data-i="${i}" data-k="address" inputmode="numeric" />
        </div>
        <div class="fx-field">
          <label>Type</label>
          <select data-i="${i}" data-k="preset">
            ${PRESETS.map((p) => `<option value="${p}" ${p === fx.preset ? "selected" : ""}>${p.toUpperCase()}</option>`).join("")}
          </select>
        </div>
      </div>
      ${fx.preset === "custom" ? renderCustomRoles(fx, i) : ""}
      <div class="fx-meta">Ch ${fx.address}–${fx.address + width - 1} · ${width} channel${width > 1 ? "s" : ""} · ${rolesOf(fx).join(" · ")}</div>
      ${errByIdx.has(i) ? `<div class="fx-err">${errByIdx.get(i).join(" · ")}</div>` : ""}
    `;
    fxEl.appendChild(div);
  });

  fxHint.textContent = fxDirty
    ? (errs.length ? `${errs.length} problem${errs.length > 1 ? "s" : ""} to fix before saving` : "Ready to save")
    : "Tap a fixture to edit. Changes are validated before saving.";
  fxSaveBtn.disabled = !fxDirty || errs.length > 0;

  // Wire up
  fxEl.querySelectorAll("[data-k]").forEach((el) => {
    el.addEventListener("input", onFieldChange);
    el.addEventListener("change", onFieldChange);
  });
  fxEl.querySelectorAll("[data-del]").forEach((el) => {
    el.addEventListener("click", (e) => {
      fxDraft.splice(Number(e.target.dataset.del), 1);
      markDirty();
    });
  });
  fxEl.querySelectorAll("[data-id]").forEach((el) => {
    el.addEventListener("click", (e) => {
      // Only useful on saved fixtures — the engine renders from cfg.fixtures,
      // not fxDraft. Warn if there are unsaved edits.
      if (fxDirty) { fxHint.textContent = "Save changes before identifying"; return; }
      send({ type: "identifyOne", index: Number(e.target.dataset.id) });
    });
  });
  fxEl.querySelectorAll("[data-role-i]").forEach((el) => {
    el.addEventListener("change", (e) => {
      const i = Number(e.target.dataset.fxI);
      const r = Number(e.target.dataset.roleI);
      fxDraft[i].roles[r] = e.target.value;
      markDirty();
    });
  });
  fxEl.querySelectorAll("[data-role-rm]").forEach((el) => {
    el.addEventListener("click", (e) => {
      const i = Number(e.target.dataset.fxI);
      const r = Number(e.target.dataset.roleRm);
      fxDraft[i].roles.splice(r, 1);
      markDirty();
    });
  });
  fxEl.querySelectorAll("[data-role-add]").forEach((el) => {
    el.addEventListener("click", (e) => {
      const i = Number(e.target.dataset.roleAdd);
      fxDraft[i].roles = fxDraft[i].roles ?? [];
      fxDraft[i].roles.push("unused");
      markDirty();
    });
  });
}

function renderCustomRoles(fx, i) {
  const roles = fx.roles ?? [];
  return `<div class="fx-roles">
    ${roles.map((r, ri) => `
      <span class="fx-role">
        <select data-role-i="${ri}" data-fx-i="${i}">
          ${ROLE_OPTIONS.map((opt) => `<option value="${opt}" ${opt === r ? "selected" : ""}>${opt}</option>`).join("")}
        </select>
        <span class="rm" data-role-rm="${ri}" data-fx-i="${i}">×</span>
      </span>
    `).join("")}
    <span class="fx-role" style="cursor:pointer" data-role-add="${i}">+ ch</span>
  </div>`;
}

/** Find the lowest address where a fixture of `width` channels fits without
 *  overlapping any of the fixtures in `others`. Returns 0 if universe is full. */
function nextFreeAddress(width, others) {
  const occupied = new Set();
  others.forEach((fx) => {
    const w = rolesOf(fx).length;
    for (let c = fx.address; c < fx.address + w; c++) occupied.add(c);
  });
  for (let start = 1; start + width - 1 <= 512; start++) {
    let ok = true;
    for (let c = start; c < start + width; c++) if (occupied.has(c)) { ok = false; break; }
    if (ok) return start;
  }
  return 0;
}

function onFieldChange(e) {
  const i = Number(e.target.dataset.i);
  const k = e.target.dataset.k;
  const fx = fxDraft[i];
  if (k === "name")    fx.name = e.target.value;
  if (k === "address") fx.address = parseInt(e.target.value, 10) || 0;
  if (k === "preset") {
    fx.preset = e.target.value;
    if (fx.preset === "custom" && !fx.roles) fx.roles = ["r","g","b"];
    if (fx.preset !== "custom") delete fx.roles;
    // If the new preset width would overlap another fixture at the current
    // address, auto-jump to the next free slot so the user doesn't have to
    // think about channel counts.
    const width = rolesOf(fx).length;
    const others = fxDraft.filter((_, idx) => idx !== i);
    const fits = nextFreeAddress(width, others);
    const overlapsHere = others.some((o) => {
      const ow = rolesOf(o).length;
      return !(fx.address + width - 1 < o.address || fx.address > o.address + ow - 1);
    });
    if (overlapsHere || fx.address + width - 1 > 512) {
      if (fits > 0) fx.address = fits;
    }
  }
  markDirty();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => (
    { "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]
  ));
}

document.getElementById("fxAdd").onclick = () => {
  const addr = nextFreeAddress(3, fxDraft);
  if (addr === 0) { fxHint.textContent = "Universe full — remove a fixture first"; return; }
  fxDraft.push({ name: `Fixture ${fxDraft.length + 1}`, address: addr, preset: "rgb" });
  markDirty();
};

document.getElementById("fxAutoPack").onclick = () => {
  // Reorder the list according to the chosen sort, then pack sequentially
  // from address 1. Reordering (not just re-addressing) means the final
  // layout in the UI matches the address order, which is what you'd expect
  // when reading top-to-bottom.
  const sort = document.getElementById("fxSort").value;
  const cmp = {
    list:      () => 0,
    name:      (a, b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: "base" }),
    widest:    (a, b) => rolesOf(b).length - rolesOf(a).length,
    narrowest: (a, b) => rolesOf(a).length - rolesOf(b).length,
  }[sort] ?? (() => 0);
  // Stable sort on a shallow copy, then mutate fxDraft in place so the
  // dirty-tracking / render pipeline picks it up.
  const ordered = fxDraft.map((fx, i) => ({ fx, i }))
    .sort((a, b) => cmp(a.fx, b.fx) || (a.i - b.i))
    .map((x) => x.fx);
  fxDraft.length = 0;
  fxDraft.push(...ordered);

  let addr = 1;
  for (const fx of fxDraft) {
    const w = rolesOf(fx).length;
    if (addr + w - 1 > 512) { fxHint.textContent = "Universe full — can't fit all fixtures"; return; }
    fx.address = addr;
    addr += w;
  }
  markDirty();
};

document.getElementById("fxIdentifyAll").onclick = () => {
  if (fxDirty) { fxHint.textContent = "Save changes before identifying"; return; }
  // Toggle: if something is already blinking, stop it; otherwise start.
  if (identifyingIndex >= 0) send({ type: "identifyStop" });
  else send({ type: "identifyAll", stepMs: 700 });
};

fxSaveBtn.onclick = () => {
  if (validateAll().length > 0) return;
  send({ type: "setFixtures", fixtures: fxDraft });
  fxDirty = false;
  fxSaveBtn.disabled = true;
  renderFixtures();
};

renderModes("auto");
connect();

</script>
</body>
</html>
